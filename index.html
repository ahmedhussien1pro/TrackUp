<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TrackUp — Discover your career path, build your roadmap, grow with mentors." />
  <meta name="theme-color" content="#6366f1" />
  <title>TrackUp</title>

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.fontshare.com" />

  <!-- Fonts -->
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,600,700,800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="./styles/tokens.css" />
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/animations.css" />
  <link rel="stylesheet" href="./styles/components.css" />

  <!-- Toastify -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/toastify-js" defer></script>

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>

  <!-- Theme bootstrap: runs before first paint to prevent flash -->
  <script>
    (function () {
      try {
        const stored = localStorage.getItem('trackup__theme');
        const sys = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', stored || sys);
        const lang = localStorage.getItem('trackup__lang') || 'en';
        document.documentElement.setAttribute('lang', lang);
        document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <a href="#app-outlet" class="sr-only focus:not-sr-only">Skip to content</a>

  <div id="app-root">
    <!-- Sidebar: injected by Layout component when authenticated -->
    <aside id="app-sidebar" class="app-sidebar" aria-hidden="true"></aside>

    <div id="app-body">
      <!-- Topbar: injected by Layout component when authenticated -->
      <header id="app-topbar" class="app-topbar" aria-hidden="true"></header>

      <!-- Router outlet: every screen renders here -->
      <main id="app-outlet" role="main" aria-live="polite"></main>
    </div>
  </div>

  <!-- Global loader shown during bootstrap -->
  <div id="app-loader" style="
    position:fixed;inset:0;display:flex;align-items:center;
    justify-content:center;background:var(--color-bg,#fff);z-index:9999;
    font-family:'Cabinet Grotesk',sans-serif;font-weight:700;
    font-size:1.5rem;letter-spacing:-0.02em;color:var(--color-primary,#6366f1);
    transition:opacity 0.3s ease;
  ">TrackUp</div>

  <script type="module" src="./src/app.js"></script>

  <script>
    // Hide loader once app.js fires DOMContentLoaded bootstrap
    document.addEventListener('DOMContentLoaded', function () {
      setTimeout(function () {
        var loader = document.getElementById('app-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(function () { loader.style.display = 'none'; }, 320);
        }
      }, 400);
    });
  </script>
</body>
</html>
